   /* CSS UNTUK CETAK (PRINT) */
@media print {
  @page {
    /* Menjaga printer thermal memotong kertas secara otomatis sesuai panjang isi */
    size: auto;
    margin: 0;
  }

  body {
    margin: 0 !important;
    padding: 0 !important;
    background: white;
    /* Memastikan body bertindak sebagai flex container untuk memposisikan nota di tengah */
    display: flex !important;
    justify-content: center !important;
    align-items: flex-start !important;
  }

  body > *:not(#printArea) {
    display: none !important;
  }

  #printArea {

display: block !important;
  width: 380px !important; 
  height: auto !important; 
  background: white;
  margin: 0 auto !important;
  padding: 0 !important; /* Ubah padding jadi 0 di sini, kita atur di dalam HTML nota saja */
  line-height: 1.2;
  overflow: visible !important;
  box-shadow: none !important;
  box-sizing: border-box !important;
}
}

/* Tambahan agar saat muncul di layar (sebelum di-share), posisinya juga di tengah */

#printArea {
  position: absolute;
  left: -9999px; /* Membuang elemen ke luar layar agar tidak merusak tampilan UI */
  top: 0;
  background: white;
  width: 380px;
}

async function shareNotaJPG(id) {
  const t = currentTransactions.find(item => item.id === id);
  if (!t) return;

  // Feedback visual sederhana
  const btn = event.currentTarget;
  const originalText = btn.innerHTML;
  btn.innerHTML = '<div class="loader w-4 h-4 border-2 border-white mr-2 inline-block"></div> Memproses...';
  btn.disabled = true;

  const printArea = document.getElementById('printArea');
  printArea.innerHTML = generateNotaHTML(t);
  printArea.classList.remove('hidden');

  try {
    // Beri waktu browser merender font & layout
    await new Promise(resolve => setTimeout(resolve, 300));

    const canvas = await html2canvas(printArea, {
      scale: 3, // Skala 3 agar gambar sangat tajam saat di-zoom di WA
      useCORS: true,
      backgroundColor: "#ffffff",
      width: 380,
      windowWidth: 380,
      logging: false
    });

    const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
    const blob = await (await fetch(dataUrl)).blob();
    
    // Memberikan nama file yang unik agar tidak tertukar di cache HP
    const fileName = `Nota_${t.id}_${Date.now()}.jpg`;
    const file = new File([blob], fileName, { type: "image/jpeg" });

    // Cek apakah browser mendukung sharing file
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'Nota Muflih Print',
        text: `Nota transaksi #${t.id} - Muflih Print`
      });
    } else {
      // Fallback: Jika tidak bisa share, maka download otomatis
      const link = document.createElement('a');
      link.download = fileName;
      link.href = dataUrl;
      link.click();
      alert("Browser Anda tidak mendukung share langsung. File telah diunduh.");
    }
  } catch (err) {
    console.error("Gagal share:", err);
    alert("Maaf, terjadi kesalahan saat memproses gambar.");
  } finally {
    // Kembalikan tombol ke semula
    btn.innerHTML = originalText;
    btn.disabled = false;
    printArea.classList.add('hidden');
  }
}


  /** * FUNGSI CETAK NOTA 
 * Menggabungkan desain UI modern dengan logika data transaksi
 **/
function generateNotaHTML(t) {
  let subtotal = 0;
  const diskon = Number(t.diskon) || 0;
  let rowsHtml = '';

  if (t.detail && t.detail.length > 0) {
    rowsHtml = t.detail.map(d => {
      const qty = Number(d.qty) || 0;
      const harga = Number(d.harga) || 0;
      const rowTotal = qty * harga;
      subtotal += rowTotal;
      return `
        <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 12px;">
          <div style="flex: 1; padding-right: 10px;">
            <div style="font-weight: 700; color: #334155; margin-bottom: 2px;">${d.nama}</div>
            <div style="font-size: 10px; color: #94a3b8;">${qty} x ${formatRupiah(harga)}</div>
          </div>
          <div style="font-weight: 700; color: #334155; text-align: right;">${formatRupiah(rowTotal)}</div>
        </div>`;
    }).join('');
  } else {
    // Gunakan nilai masuk atau keluar mana yang ada angkanya
    const val = Number(t.masuk) > 0 ? Number(t.masuk) : (Number(t.keluar) || 0);
    subtotal = val + diskon;
    rowsHtml = `
      <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 12px;">
        <div style="flex: 1;">

/** PROSES EKSEKUSI PEMBATALAN DENGAN KATEGORI SPESIFIK **/
async function confirmCancel(id) {
  // Cari data transaksi berdasarkan ID
  const tx = currentTransactions.find(t => t.id === id);
  if (!tx) return;

  let kategoriBaru = "";
  const katAsal = tx.kat.toUpperCase().trim();

  if (katAsal === 'PENJUALAN') {
    kategoriBaru = "CANCEL ORDER";
  } else if (katAsal === 'PEMBELIAN') {
    kategoriBaru = "CANCEL BELI";
  } else if (katAsal === 'OPERASIONAL') {
    kategoriBaru = "CANCEL BIAYA";
  } else {
    kategoriBaru = "CANCEL " + katAsal;
  }

  const pesan = `Apakah Anda yakin ingin MEMBATALKAN transaksi ini?\n\n` +
                `Keterangan: ${tx.ket}\n` +
                `Kategori akan diubah menjadi: ${kategoriBaru}\n\n` +
                `Catatan: Stok akan dikembalikan otomatis, namun saldo TIDAK berubah. ` +
                `Input manual pengembalian dana di menu Operasional jika diperlukan.`;

  if (!confirm(pesan)) return;

  if (typeof showLoading === "function") showLoading();

  // --- MULAI PROSES FETCH KE GITHUB ---

  try {
    const payload = {
      action: "processCancelOrder",
      transactionId: id,
      newCategory: kategoriBaru
    };

    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors", // Agar tidak terblokir kebijakan CORS
      cache: "no-cache",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    // Beri jeda agar server selesai memproses update stok & kategori
    setTimeout(() => {
      alert("Transaksi berhasil dibatalkan sebagai " + kategoriBaru + ". Stok telah diperbarui.");
      closeModal();
      if (typeof hideLoading === "function") hideLoading();
       showListLoading();
      refreshData(); // Ambil data terbaru dari spreadsheet
    }, 1500);

  } catch (err) {
    hideListLoading();
    console.error("Error Cancel:", err);
    if (typeof hideLoading === "function") hideLoading();
    alert("Gagal membatalkan transaksi: Terjadi kesalahan koneksi.");
  }
}

   async function refreshData() {
  const loadingElement = document.getElementById('loadingSpinner'); // Jika ada spinner
  if (loadingElement) loadingElement.classList.remove('hidden');

  try {
    // 1. Ambil Saldo (Balances)
    const resBal = await fetch(`${WEB_APP_URL}?action=getBalances`);
    const balances = await resBal.json();
    
    document.getElementById('cashBal').innerText = formatRupiah(balances.cash);
    document.getElementById('bankBal').innerText = formatRupiah(balances.bank);

    // 2. Ambil Transaksi (Transactions)
    const resTrans = await fetch(`${WEB_APP_URL}?action=getTransactions`);
    const transactions = await resTrans.json();
    
    currentTransactions = transactions;
    renderTransactions();
    hideListLoading();
    console.log("Data berhasil diperbarui dari server.");
  } catch (err) {
    hideListLoading();

    // Fallback data jika server gagal diakses
    document.getElementById('cashBal').innerText = formatRupiah(0);
    document.getElementById('bankBal').innerText = formatRupiah(0);
  } finally {
    if (loadingElement) loadingElement.classList.add('hidden');

function renderTransactions() {
  const container = document.getElementById('listContainer');
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  
  // Ambil nilai dari input rentang tanggal
  const ds = document.getElementById('f-date-start').value;
  const de = document.getElementById('f-date-end').value;
  
  container.innerHTML = '';

  const filtered = currentTransactions.filter(t => {
    // 1. Filter Navigasi Metode (Cash/Rekening/Semua)
    if (currentView !== 'Semua' && t.metode !== currentView) return false;

    // 2. Filter Kategori (PENJUALAN/PEMBELIAN/OPERASIONAL)
    if (currentCategory !== 'SEMUA') {
      if (!t.kat || t.kat.toUpperCase().trim() !== currentCategory) return false;
    }

    // 3. Filter Waktu (Rentang Tanggal)
    const tDate = t.waktu.split(' ')[0]; // Ambil YYYY-MM-DD
    if (currentFilter !== 'all') {
      if (ds && de) {
        // Cek apakah tanggal transaksi berada di dalam rentang
        if (tDate < ds || tDate > de) return false;
      } else if (ds && tDate !== ds) {
        // Jika hanya tanggal mulai yang diisi, anggap filter tanggal tunggal
        return false;
      }
    }

    // 4. Logika Pencarian
    const matchSearch = t.ket.toLowerCase().includes(searchTerm) ||
                        t.sub.toLowerCase().includes(searchTerm) ||
                        t.kat.toLowerCase().includes(searchTerm);

    return matchSearch;
  });

  // Tampilan jika data kosong
  if (filtered.length === 0) {

   function setFilter(f) {
  currentFilter = f;
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const date = String(now.getDate()).padStart(2, '0');
  const monthStr = String(month + 1).padStart(2, '0');

  // String untuk tanggal hari ini
  const todayStr = `${year}-${monthStr}-${date}`;

  // 1. Update UI Tombol (Toggle Warna)
  ['today', 'month', 'all'].forEach(type => {
    const el = document.getElementById('f-' + type);
    if (el) {
      el.className = (f === type) ? 
        'px-3 py-1 bg-blue-600 text-white rounded-full transition' : 
        'px-3 py-1 bg-gray-100 rounded-full hover:bg-gray-200 transition';
    }
  });

  // 2. Logika Pengaturan Tanggal
  if (f === 'today') {
    document.getElementById('f-date-start').value = todayStr;
    document.getElementById('f-date-end').value = todayStr;
  } 
  else if (f === 'month') {
    const firstDay = `${year}-${monthStr}-01`;
    
    document.getElementById('f-date-start').value = firstDay;
    // PERUBAHAN DI SINI: Menggunakan todayStr agar filter berakhir di hari ini
    document.getElementById('f-date-end').value = todayStr;
  }
  else if (f === 'all') {
    if (currentTransactions.length > 0) {
      const dates = currentTransactions.map(t => t.waktu.split(' ')[0]).sort();
      document.getElementById('f-date-start').value = dates[0];
      document.getElementById('f-date-end').value = dates[dates.length - 1];
    }
  }

  renderTransactions();
}

// 1. Mengubah angka saat diketik menjadi format 1.000.000
function maskNominal(el) {
  let val = el.value.replace(/\D/g, ""); // Hapus semua karakter yang bukan angka
  if (val === "") { el.value = ""; return; }
  el.value = Number(val).toLocaleString('id-ID'); // Format ke Rupiah tanpa 'Rp'
}

// 2. Membersihkan format titik agar menjadi angka murni (1.000 -> 1000)
function unmask(val) {
  if (!val) return 0;
  // Menghapus titik agar JavaScript bisa melakukan operasi matematika (+ - * /)
  return parseFloat(val.toString().replace(/\./g, "")) || 0;
}


    function removeItem(id) {
      document.getElementById(`item-${id}`).remove();
      calcTotal();
    }

    function calcTotal() {
      let subtotal = 0;
      const rows = document.querySelectorAll('#itemContainer > div');
      rows.forEach(row => {
        const inps = row.querySelectorAll('input');
        if (inps.length >= 3) {
          const qty = parseFloat(inps[1].value) || 0;
          const price = unmask(inps[2].value); // PERUBAHAN: Gunakan unmask()
          subtotal += (qty * price);
        }
      });

      // Penjualan Logic
      const rawEl = document.getElementById('p_total_raw');
      if (rawEl) {
        const disc = unmask(document.getElementById('p_disc').value); // PERUBAHAN: unmask
        const totalAkhir = subtotal - disc;
        const dp = unmask(document.getElementById('p_dp').value); // PERUBAHAN: unmask
        
        rawEl.innerText = formatRupiah(subtotal);
        document.getElementById('p_final').innerText = formatRupiah(totalAkhir);
        
        const statusPiutang = document.getElementById('p_status_piutang');
        if(dp < totalAkhir) {
          statusPiutang.innerText = `Catatan: Sisa Rp ${Number(totalAkhir - dp).toLocaleString('id-ID')} akan masuk ke daftar PIUTANG.`;
          statusPiutang.className = "text-[10px] mt-1 text-orange-600 font-medium italic";
        } else if (dp > totalAkhir) {
          statusPiutang.innerText = `Catatan: Kelebihan bayar Rp ${Number(dp - totalAkhir).toLocaleString('id-ID')}.`;
          statusPiutang.className = "text-[10px] mt-1 text-blue-600 font-medium italic";
        } else {
          statusPiutang.innerText = "Lunas.";
          statusPiutang.className = "text-[10px] mt-1 text-green-600 font-medium italic";
        }
      }
      
      // Pembelian Logic
      const finalElB = document.getElementById('b_final');
      if (finalElB) finalElB.innerText = formatRupiah(subtotal);
    }

    function collectItems() {
      const items = [];
      document.querySelectorAll('#itemContainer > div').forEach(row => {
        const inps = row.querySelectorAll('input');
        if(inps.length >= 3 && inps[0].value) {
          items.push({ 
            nama: inps[0].value, 
            qty: parseFloat(inps[1].value) || 0, 
            harga: unmask(inps[2].value) // PERUBAHAN: Kirim angka bersih ke database
          });
        }
      });
      return items;
    }

async function runScript(method, payload) {
  // 1. Kunci tombol agar tidak klik ganda
  const btn = document.querySelector('button[onclick*="save"]');
  if (btn) btn.disabled = true;

  // 2. Langsung kunci daftar riwayat (efek gelap)
  if (typeof showListLoading === 'function') showListLoading();

  try {
    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      cache: "no-cache",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });

    // 3. Langsung tutup modal tanpa menunggu alert
    closeModal();

    // 4. Beri jeda sebentar lalu segarkan data
    setTimeout(() => {
      refreshData(); // refreshData harus memanggil hideListLoading() di akhirnya
    }, 1000);

  } catch (err) {
    // 5. Jika GAGAL, buka kembali kuncinya dan beri peringatan
    if (typeof hideListLoading === 'function') hideListLoading();
    console.error("Gagal:", err);
    alert("Koneksi bermasalah. Data gagal terkirim ke server!");
  } finally {
    if (btn) btn.disabled = false;
  }
}

function downloadExcel() {
    const ds = document.getElementById('f-date-start').value;
    const de = document.getElementById('f-date-end').value;
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();

    const filteredData = currentTransactions.filter(t => {
        if (currentView !== 'Semua' && t.metode !== currentView) return false;
        if (currentCategory !== 'SEMUA' && (!t.kat || t.kat.toUpperCase().trim() !== currentCategory)) return false;
        const tDate = t.waktu.split(' ')[0];
        if (currentFilter !== 'all' && (tDate < ds || tDate > de)) return false;
        return t.ket.toLowerCase().includes(searchTerm) || t.sub.toLowerCase().includes(searchTerm);
    });

    if (filteredData.length === 0) return alert("Data kosong");

    // ... (Logika penyusunan excelRows dan summaryRows tetap sama seperti kode Anda) ...
    let excelRows = [];
    let summaryMap = {};
    filteredData.forEach(t => {
        const diskonTotal = parseFloat(t.diskon) || 0;
        const kategori = (t.kat || 'LAIN-LAIN').toUpperCase().trim();
        if (!summaryMap[kategori]) summaryMap[kategori] = { Masuk: 0, Keluar: 0, Diskon: 0, Net: 0 };
        if (t.detail && t.detail.length > 0) {
            t.detail.forEach((item, index) => {
                const subItem = (parseFloat(item.qty) || 0) * (parseFloat(item.harga) || 0);
                const dRow = index === 0 ? diskonTotal : 0;
                const netRow = subItem - dRow;
                excelRows.push({
                    'Waktu': t.waktu, 'ID': t.id, 'Kategori': t.kat, 'Pelanggan': t.sub, 'Barang': item.nama,
                    'Qty': parseFloat(item.qty), 'Harga Satuan': parseFloat(item.harga), 'Subtotal': subItem,
                    'Diskon': dRow, 'Total Net': netRow, 'Metode': t.metode, 'Ket': t.ket
                });
                if (t.tipe === 'MASUK') summaryMap[kategori].Masuk += subItem;
                else summaryMap[kategori].Keluar += subItem;
                summaryMap[kategori].Diskon += dRow;
                summaryMap[kategori].Net += netRow;
            });
        } else {
            const nom = parseFloat(t.masuk || t.keluar) || 0;
            const netRow = nom - diskonTotal;
            excelRows.push({
                'Waktu': t.waktu, 'ID': t.id, 'Kategori': t.kat, 'Pelanggan': t.sub, 'Barang': '-',
                'Qty': 1, 'Harga Satuan': nom, 'Subtotal': nom, 'Diskon': diskonTotal, 'Total Net': netRow,
                'Metode': t.metode, 'Ket': t.ket
            });
            if (t.tipe === 'MASUK') summaryMap[kategori].Masuk += nom;
            else summaryMap[kategori].Keluar += nom;
            summaryMap[kategori].Diskon += diskonTotal;
            summaryMap[kategori].Net += netRow;
        }
    });

    let summaryRows = Object.keys(summaryMap).map(kat => ({
        'Kategori': kat,
        'Total Masuk': summaryMap[kat].Masuk,
        'Total Keluar': summaryMap[kat].Keluar,
        'Total Diskon': summaryMap[kat].Diskon,
        'Total Bersih (Net)': summaryMap[kat].Net
    }));

    const labelKategori = currentCategory === 'SEMUA' ? 'SEMUA TRANSAKSI' : currentCategory;
    const fileName = `Laporan_${labelKategori}_${ds}_sd_${de}.xlsx`;
    const workbook = XLSX.utils.book_new();

    /** SHEET 1: DETAIL **/
    const wsDetail = XLSX.utils.aoa_to_sheet([
        [`LAPORAN DETAIL TRANSAKSI - VI PRINTING`], // Baris 1: Judul
        [`Periode: ${ds} s/d ${de} | Kategori: ${labelKategori}`], // Baris 2: Sub-judul
        [] // Baris 3: Kosong
    ]);
    // Tambahkan data JSON mulai dari baris ke-4 (A4)
    XLSX.utils.sheet_add_json(wsDetail, excelRows, { origin: "A4" });
    autoFitColumns(wsDetail, excelRows);
    formatRupiahExcel(wsDetail, [6, 7, 8, 9], 4); // Start row disesuaikan ke baris data
    XLSX.utils.book_append_sheet(workbook, wsDetail, "Detail Transaksi");

    /** SHEET 2: RINGKASAN **/
    const wsSummary = XLSX.utils.aoa_to_sheet([
        [`RINGKASAN KATEGORI - VI PRINTING`],
        [`Periode: ${ds} s/d ${de}`],
        []
    ]);
    XLSX.utils.sheet_add_json(wsSummary, summaryRows, { origin: "A4" });
    autoFitColumns(wsSummary, summaryRows);
    formatRupiahExcel(wsSummary, [1, 2, 3, 4], 4);
    XLSX.utils.book_append_sheet(workbook, wsSummary, "Ringkasan Kategori");

    XLSX.writeFile(workbook, fileName);
}


/** * FUNGSI AUTOFIT DINAMIS
 * Menghitung lebar maksimal karakter di setiap kolom
 **/
function autoFitColumns(worksheet, jsonData) {
    const objectMaxLength = [];
    const keys = Object.keys(jsonData[0]);

    // Ambil panjang header sebagai panjang minimal
    keys.forEach((key) => {
        objectMaxLength.push(key.length + 5); // +5 untuk padding agar tidak terlalu mepet
    });

    // Loop setiap baris data untuk mencari teks terpanjang
    jsonData.forEach((row) => {
        keys.forEach((key, index) => {
            const value = row[key] ? row[key].toString() : "";
            if (value.length + 2 > objectMaxLength[index]) {
                objectMaxLength[index] = value.length + 2;
            }
        });
    });

    // Terapkan ke properti !cols pada worksheet
    worksheet['!cols'] = objectMaxLength.map(w => ({ wch: w }));
}

function formatRupiahExcel(worksheet, cols, dataStartRow = 1) {
    const range = XLSX.utils.decode_range(worksheet['!ref']);
    // R dimulai dari dataStartRow (biasanya index 4 karena ada judul 3 baris)
    for (let R = dataStartRow; R <= range.e.r; ++R) {
        cols.forEach(colIdx => {
            const cell = worksheet[XLSX.utils.encode_cell({ r: R, c: colIdx })];
            if (cell && typeof cell.v === 'number') {
                cell.t = 'n';
                cell.z = '"Rp"* #,##0';
            }
        });
    }
}
