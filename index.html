<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kasir & Arus Kas Modern</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-active { color: #2563eb !important; }
    .nav-active i { transform: translateY(-2px); transition: transform 0.2s; }
    .page-transition { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 5.5rem); }
    input, select, textarea { font-size: 16px !important; }
    .accounting { text-align: right; font-family: monospace; }

    /* Efek untuk tombol menu 'Lainnya' yang aktif */
/* Style Tombol Aktif di Menu Lainnya */
.action-btn-active {
  background-color: #ffffff !important;
  transform: scale(0.95);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
}

/* Garis bawah indikator untuk tombol aktif */
.action-btn-active::after {
  content: '';
  position: absolute;
  bottom: 6px;
  width: 12px;
  height: 3px;
  border-radius: 99px;
  background-color: currentColor;
}

/* Animasi Ikon saat aktif */
.action-btn-active .icon-box {
  transform: scale(1.1);
}
    
    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      z-index: 9999;
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    
    /* Modal Styles */
   /* Modal Styles Terbaru */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
   align-items: start;  /* Mengubah posisi dari 'end' ke 'start' */
  justify-content: center;
  padding-top: 20px;   /* Memberi jarak sedikit dari atas layar ponsel */
}

.modal-content {
  background: white;
  width: 95%;          /* Memberi sedikit ruang di kiri-kanan */
  max-width: 28rem;
  border-radius: 24px;  /* Membuat semua sudut membulat */
  max-height: 85vh;
  overflow-y: auto;
  animation: slideDown 0.3s ease-out; /* Menggunakan animasi meluncur ke bawah */
  display: flex;
  flex-direction: column;
}

/* Animasi baru agar modal muncul dari atas */
@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
  </style>
</head>
<body class="pb-safe">

  <div id="loading-overlay">
    <div class="spinner mb-2"></div>
    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Memproses...</p>
  </div>

  <!-- Modal Pemilih Barang -->
  <div id="product-modal" class="modal-backdrop" onclick="closeProductModal(event)">
    <div class="modal-content p-5 shadow-2xl" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold">Pilih Barang (Sheet Stok)</h3>
        <button onclick="closeProductModal()" class="p-2 bg-slate-100 rounded-full">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="relative mb-4">
        <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-slate-400"></i>
        <input type="text" id="modal-search" placeholder="Cari di stok atau ketik nama baru..." 
               class="w-full p-3 pl-10 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium"
               oninput="this.value = this.value.toUpperCase(); filterProducts()">
      </div>
      <div id="product-list" class="space-y-2 overflow-y-auto pr-1 mb-4 flex-1 min-h-[200px]">
        <!-- List barang dari sheet akan muncul di sini -->
      </div>
      <button id="btn-manual-add" onclick="selectManual()" class="w-full p-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg hidden">
        Gunakan "<span id="manual-text"></span>" Sebagai Barang Baru
      </button>
    </div>
  </div>

<div id="general-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
  <div class="bg-white w-full rounded-3xl overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">
    <div id="modalContent" class="p-6">
      </div>
  </div>
</div>
  

  <header class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
    <div class="mx-auto flex justify-between items-center">
      <div>
        <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Total Saldo Kas</p>
        <h1 id="total-balance" class="text-xl font-bold text-slate-800">Rp 0</h1>
      </div>
      <div class="flex gap-2">
        <button class="bg-slate-50 p-2 rounded-lg active:scale-95 transition-transform" onclick="fetchMasterStock()">
          <i data-lucide="package-search" class="text-slate-600 w-5 h-5"></i>
        </button>
        <button class="bg-blue-50 p-2 rounded-lg active:scale-95 transition-transform" onclick="refreshData()">
          <i data-lucide="refresh-cw" class="text-blue-600 w-5 h-5"></i>
        </button>
      </div>

  <main id="main-content" class="mx-auto p-4 page-transition">
    <div id="menu-container" class="space-y-4"></div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-2 py-1 z-[100] flex justify-around items-center shadow-[0_-8px_20px_rgba(0,0,0,0.03)]">
    <button onclick="changeTab('penjualan')" id="nav-penjualan" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400 nav-active">
      <i data-lucide="shopping-bag" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Jual</span>
    </button>
    <button onclick="changeTab('pembelian')" id="nav-pembelian" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400">
      <i data-lucide="truck" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Beli</span>
    </button>
    <button onclick="changeTab('operasional')" id="nav-operasional" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400">
      <i data-lucide="calculator" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Biaya</span>
    </button>
    <button onclick="changeTab('riwayat')" id="nav-riwayat" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400">
      <i data-lucide="history" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Riwayat</span>
    </button>
    <button onclick="changeTab('lainnya')" id="nav-lainnya" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400">
      <i data-lucide="grid" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Lainnya</span>
    </button>
  </nav>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxr-9pvoi-2f0pIrlarOnRC3--Hp1kb63WbBBjA-vYhqubd5QYkSqwDWlqPNA6Tc-3SIA/exec";

    let allTransactions = [];
    let currentFilter = 'today';
    let currentView = 'Semua';
    let currentCategory = 'SEMUA';
    let productMaster = [];
let currentTransactions = []; // Tambahkan ini di bagian atas script jika belum ada
let adaTransaksiBaru = false;   // Untuk logika klik riwayat yang Anda minta sebelumnya
    // Inisialisasi
    window.onload = () => {
      changeTab('penjualan');
      refreshData();
    };

   function showLoading(show) {
      document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
    }

    function closeModal() {
  const modal = document.getElementById('general-modal');
  if (modal) {
    modal.classList.add('hidden');
  }
}
 

    /** HALAMAN RIWAYAT **/
    function renderRiwayatPage() {
      const container = document.getElementById('menu-container');
      container.innerHTML = `
        <div class="overflow-hidden">
          <div class="p-4 border-b flex flex-col gap-3">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-3">
                           <div class="flex flex-wrap gap-1 text-[10px] items-center">
                <button onclick="setFilter('today')" id="f-today" class="px-3 py-1 bg-blue-600 text-white rounded-full transition">Hari Ini</button>
                <button onclick="setFilter('month')" id="f-month" class="px-3 py-1 bg-gray-100 rounded-full transition">Bulan Ini</button>
                <button onclick="setFilter('all')" id="f-all" class="px-3 py-1 bg-gray-100 rounded-full transition">Semua</button>
                <div class="flex items-center gap-1 bg-slate-50 border rounded-full px-2 py-1 ml-1">
                  <input type="date" id="f-date-start" onchange="renderTransactions()" class="bg-transparent outline-none border-none text-[9px]">
                  <span class="text-gray-400 font-bold">-</span>
                  <input type="date" id="f-date-end" onchange="renderTransactions()" class="bg-transparent outline-none border-none text-[9px]">
                </div>
              </div>
            </div>
            <div class="flex gap-2 items-center">
              <div class="relative flex-1">
                <span class="absolute inset-y-0 left-3 flex items-center text-gray-400"><i data-lucide="search" class="w-4 h-4"></i></span>
                <input type="text" id="searchInput" oninput="renderTransactions()" placeholder="Cari ID, keterangan atau nama..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-100">
              </div>
              <button onclick="downloadExcel()" class="px-4 py-2 bg-green-600 text-white rounded-lg flex items-center gap-2 h-[40px]"><i data-lucide="download" class="w-4 h-4"></i></button>
            </div>
          </div>
          <div>
            <div class="flex border-b text-sm">
              <button onclick="setView('Cash')" id="v-cash" class="flex-1 py-3 font-semibold text-gray-500 hover:bg-gray-50 transition border-b-2 border-transparent">Cash</button>
              <button onclick="setView('Rekening')" id="v-bank" class="flex-1 py-3 font-semibold text-gray-500 hover:bg-gray-50 transition border-b-2 border-transparent">Rekening</button>
              <button onclick="setView('Semua')" id="v-all" class="flex-1 py-3 font-semibold border-b-2 border-blue-600 text-blue-600 transition">Semua</button>
            </div>
            <div class="flex border-b text-[10px] uppercase tracking-wider font-bold text-slate-400 no-scrollbar overflow-x-auto bg-slate-50/50">
              <button onclick="setCategory('SEMUA')" id="cat-semua" class="flex-1 min-w-[80px] py-2 border-b-2 border-blue-500 text-blue-600 bg-white font-bold transition">Semua</button>
              <button onclick="setCategory('PENJUALAN')" id="cat-penjualan" class="flex-1 min-w-[80px] py-2 border-b-2 border-transparent hover:bg-gray-50 transition">Jual</button>
              <button onclick="setCategory('PEMBELIAN')" id="cat-pembelian" class="flex-1 min-w-[80px] py-2 border-b-2 border-transparent hover:bg-gray-50 transition">Beli</button>
              <button onclick="setCategory('OPERASIONAL')" id="cat-operasional" class="flex-1 min-w-[80px] py-2 border-b-2 border-transparent hover:bg-gray-50 transition">Ops</button>
            </div>
            <div id="listContainer" class="divide-y max-h-[500px] overflow-y-auto"></div>
          </div>
        </div>
      `;
      lucide.createIcons();
      fetchTransactions();
    }

    async function fetchTransactions() {
      try {
        const res = await fetch(`${WEB_APP_URL}?action=getTransactions&_=${Date.now()}`);
        allTransactions = await res.json();
        setFilter('today'); 
      } catch (e) {
        document.getElementById('listContainer').innerHTML = `<div class="p-8 text-center text-red-500 font-bold">Gagal mengambil data.</div>`;
      }
    }

    function setCategory(cat) {
      currentCategory = cat;
      const categories = ['SEMUA', 'PENJUALAN', 'PEMBELIAN', 'OPERASIONAL'];
      categories.forEach(c => {
        const el = document.getElementById(`cat-${c.toLowerCase()}`);
        if (el) el.className = (c === cat) ? "flex-1 py-2 border-b-2 border-blue-500 text-blue-600 bg-white font-bold transition" : "flex-1 py-2 border-b-2 border-transparent hover:bg-gray-50 transition";
      });
      renderTransactions();
    }

    function renderTransactions() {
      const container = document.getElementById('listContainer');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const ds = document.getElementById('f-date-start').value;
      const de = document.getElementById('f-date-end').value;
      container.innerHTML = '';

     const filtered = allTransactions.filter(t => {
  if (currentView !== 'Semua' && t.metode !== currentView) return false;
  if (currentCategory !== 'SEMUA' && (!t.kat || t.kat.toUpperCase().trim() !== currentCategory)) return false;
  
  const tDate = t.waktu.split(' ')[0]; // Mengambil bagian YYYY-MM-DD
  
  // Logika Filter Tanggal
  if (currentFilter !== 'all') {
    const ds = document.getElementById('f-date-start').value;
    const de = document.getElementById('f-date-end').value;
    
    if (ds && de) { 
      if (tDate < ds || tDate > de) return false; 
    } else if (ds && tDate !== ds) {
      return false;
    }
  }

  return t.id.toLowerCase().includes(searchTerm) || 
         t.ket.toLowerCase().includes(searchTerm) || 
         (t.sub && t.sub.toLowerCase().includes(searchTerm));
});
      if (filtered.length === 0) {
        container.innerHTML = `<div class="p-12 text-center text-gray-400 italic text-sm">Tidak ada transaksi ditemukan</div>`;
        return;
      }

      filtered.forEach(t => {
        const isMasuk = t.tipe === 'MASUK';
        const amount = isMasuk ? t.masuk : t.keluar;
        const div = document.createElement('div');
        div.className = `p-4 hover:bg-slate-50 cursor-pointer flex justify-between items-center border-l-4 ${isMasuk ? 'border-l-green-500' : 'border-l-red-500'}`;
        div.onclick = () => showDetail(t);
        div.innerHTML = `
          <div class="flex-1 pr-4">
            <p class="text-[10px] text-gray-500 mb-0.5">${t.waktu}</p>
            <p class="font-semibold text-sm text-slate-800">${t.ket}</p>
            <div class="flex gap-2 mt-1">
              <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded uppercase font-bold text-slate-500">${t.kat}</span>
              ${t.sub !== '-' ? `<span class="text-[9px] text-slate-400 italic">${t.sub}</span>` : ''}
            </div>
          </div>
          <div class="text-right">
            <p class="font-bold text-sm ${isMasuk ? 'text-green-600' : 'text-red-600'}">${isMasuk ? '+' : '-'} ${formatRupiah(amount)}</p>
          </div>
        `;
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    function setFilter(f) {
  currentFilter = f;
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const date = String(now.getDate()).padStart(2, '0');
  const monthStr = String(month + 1).padStart(2, '0');

  // String untuk tanggal hari ini (YYYY-MM-DD)
  const todayStr = `${year}-${monthStr}-${date}`;

  // 1. Update UI Tombol (Toggle Warna)
  ['today', 'month', 'all'].forEach(type => {
    const el = document.getElementById('f-' + type);
    if (el) {
      el.className = (f === type) ? 
        'px-3 py-1 bg-blue-600 text-white rounded-full transition' : 
        'px-3 py-1 bg-gray-100 rounded-full hover:bg-gray-200 transition';
    }
  });

  // 2. Logika Pengisian Input Tanggal
  if (f === 'today') {
    document.getElementById('f-date-start').value = todayStr;
    document.getElementById('f-date-end').value = todayStr;
  } else if (f === 'month') {
    document.getElementById('f-date-start').value = `${year}-${monthStr}-01`;
    document.getElementById('f-date-end').value = todayStr;
  } else if (f === 'all') {
    document.getElementById('f-date-start').value = '';
    document.getElementById('f-date-end').value = '';
  }

  // 3. Jalankan Render Data
  renderTransactions();
}
    function setView(v) {
      currentView = v;
      ['v-cash', 'v-bank', 'v-all'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.className = 'flex-1 py-3 font-semibold text-gray-500 transition border-b-2 border-transparent';
      });
      const activeId = v === 'Cash' ? 'v-cash' : (v === 'Rekening' ? 'v-bank' : 'v-all');
      document.getElementById(activeId).className = 'flex-1 py-3 font-semibold border-b-2 border-blue-600 text-blue-600 transition';
      renderTransactions();
    }

    function showDetail(t) {
      const overlay = document.getElementById('modalOverlay');
      const content = document.getElementById('modalContent');
      overlay.classList.remove('hidden');
      
      let detailHtml = (t.detail || []).map(d => `
        <div class="flex justify-between text-xs py-1 border-b border-dashed">
          <span>${d.nama} (x${d.qty})</span>
          <span class="font-mono">${formatRupiah(d.qty * d.harga)}</span>
        </div>`).join('');

      content.innerHTML = `
        <h2 class="text-lg font-bold mb-4">Detail Transaksi</h2>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span class="text-gray-500">ID / Waktu</span><span class="font-bold text-right">${t.id}<br><small>${t.waktu}</small></span></div>
          <div class="flex justify-between border-t pt-2"><span class="text-gray-500">Kategori</span><span class="font-bold">${t.kat}</span></div>
          <div class="flex justify-between"><span class="text-gray-500">Metode</span><span class="font-bold">${t.metode}</span></div>
          <div class="pt-2">
            <p class="text-gray-500 mb-1">Rincian Item:</p>
            <div class="bg-slate-50 p-2 rounded border">${detailHtml || '<p class="italic text-xs text-center p-2">Tidak ada item</p>'}</div>
          </div>
          <div class="flex justify-between text-lg font-black pt-3 border-t">
            <span>Total</span><span class="${t.tipe === 'MASUK' ? 'text-green-600' : 'text-red-600'}">${formatRupiah(t.masuk || t.keluar)}</span>
          </div>
        </div>
        <button onclick="closeModal()" class="w-full mt-6 py-3 bg-slate-100 rounded-xl font-bold">Tutup</button>
      `;
      lucide.createIcons();
    }

   async function refreshData(isFullRefresh = false) {
  const loadingElement = document.getElementById('loadingSpinner');
  if (loadingElement) loadingElement.classList.remove('hidden');

  try {
    // 1. Ambil Saldo (Selalu ambil saldo terbaru dengan cache busting)
    const resBal = await fetch(`${WEB_APP_URL}?action=getBalances&_=${Date.now()}`);
    const balances = await resBal.json();
    
    // Pastikan ID elemen ini sesuai dengan HTML Anda (cashBal & bankBal)
    if(document.getElementById('cashBal')) 
       document.getElementById('cashBal').innerText = formatRupiah(balances.cash);
    if(document.getElementById('bankBal'))
       document.getElementById('bankBal').innerText = formatRupiah(balances.bank);

    // 2. Ambil Transaksi secara Pintar (Incremental)
    // Ambil ID terbaru dari indeks 0 karena data terbaru biasanya di atas
    let lastId = (currentTransactions.length > 0 && !isFullRefresh) ? currentTransactions[0].id : "";
    
    const resTrans = await fetch(`${WEB_APP_URL}?action=getTransactions&lastId=${lastId}`);
    const newData = await resTrans.json();
    
    if (newData && newData.length > 0) {
      if (isFullRefresh || currentTransactions.length === 0) {
        currentTransactions = newData;
      } else {
        // Gabungkan: data baru (newData) ditaruh di depan data lama (currentTransactions)
        currentTransactions = [...newData, ...currentTransactions];
      }
      renderTransactions(); // Jalankan fungsi untuk menggambar tabel
    }
    
    adaTransaksiBaru = false; // Reset penanda transaksi
    console.log(`Sinkronisasi berhasil. ${newData.length} data baru.`);
    
  } catch (err) {
    console.error("Gagal refresh data:", err);
  } finally {
    if (loadingElement) loadingElement.classList.add('hidden');
    // Fungsi pembantu untuk menyembunyikan loading di list riwayat
    if (typeof hideListLoading === "function") hideListLoading(); 
  }
}

    function downloadExcel() { alert("Fitur Excel akan segera hadir."); }

    // Halaman placeholder untuk contoh integrasi
    function renderPenjualanPage() {
      document.getElementById('menu-container').innerHTML = `
        <div class="bg-white p-6 rounded-3xl border shadow-sm">
          <h2 class="text-xl font-bold mb-4">Penjualan Baru</h2>
          <p class="text-sm text-gray-500">Gunakan menu navigasi di bawah untuk berpindah halaman.</p>
        </div>
      `;
    }
    
    async function fetchMasterStock() {
      try {
        const response = await fetch(`${WEB_APP_URL}?action=getStockNames&_=${Date.now()}`);
        const data = await response.json();
        productMaster = data.map(name => ({ nama: name.toUpperCase(), harga: 0 })); 
      } catch (e) {
        console.error("Gagal ambil master stok:", e);
      }
    }

   function changeTab(tab) {
 currentTab = tab;
  
  // Jika pindah ke tab riwayat
  if (tab === 'riwayat') {
    // Refresh HANYA jika penanda aktif atau data masih kosong
    if (adaTransaksiBaru || currentTransactions.length === 0) {
      refreshData(); 
    } else {
      renderTransactions(); // Langsung tampilkan dari memori
    }
  }
  const menuContainer = document.getElementById('menu-container');
  
  // Update UI Navigasi
  document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
  const activeBtn = document.getElementById('nav-' + tab);
  if (activeBtn) activeBtn.classList.add('nav-active');

  if (tab === 'riwayat') {
    renderRiwayatPage();
  } 
  else if (tab === 'penjualan') {
    menuContainer.innerHTML = `
      <div class="space-y-4 page-transition">
        <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="shopping-cart" class="w-5 text-blue-600"></i> Penjualan Baru</h2>
        <div class="grid grid-cols-1 gap-2">

    async function openProductModal(inputId) {
      currentTargetInputId = inputId;
      document.getElementById('product-modal').style.display = 'flex';
      if (productMaster.length === 0) {
        showLoading(true);
        await fetchMasterStock();
        showLoading(false);
      }
      document.getElementById('modal-search').value = '';
      document.getElementById('modal-search').focus();
      filterProducts();
    }

    function closeProductModal(e) {
      if (!e || e.target.id === 'product-modal') {
        document.getElementById('product-modal').style.display = 'none';
      }
    }

    function filterProducts() {
      const query = document.getElementById('modal-search').value.toUpperCase().trim();
      const list = document.getElementById('product-list');
      const btnManual = document.getElementById('btn-manual-add');
      const manualText = document.getElementById('manual-text');
      list.innerHTML = '';
      const filtered = productMaster.filter(p => p.nama.toUpperCase().includes(query));
      if (filtered.length > 0) {
        filtered.forEach(p => {
          const div = document.createElement('div');
          div.className = "p-4 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center active:bg-blue-50 transition-colors cursor-pointer hover:border-blue-200";
          div.onclick = () => selectProduct(p.nama.toUpperCase(), p.harga);
          div.innerHTML = `
            <div class="flex items-center gap-3">
               <div class="bg-blue-100 p-2 rounded-lg"><i data-lucide="package" class="w-4 h-4 text-blue-600"></i></div>
               <span class="font-semibold text-slate-700 uppercase">${p.nama}</span>
            </div>
            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
          `;
          list.appendChild(div);
        });
        btnManual.classList.add('hidden');
      } else {
        const empty = document.createElement('div');
        empty.className = "flex flex-col items-center justify-center p-10 text-center text-slate-400";
        empty.innerHTML = `<div class="bg-slate-100 p-4 rounded-full mb-3"><i data-lucide="search-x" class="w-8 h-8"></i></div><p class="text-sm">Barang tidak ada di database stok.</p>`;
        list.appendChild(empty);
        if (query.length > 0) {
          btnManual.classList.remove('hidden');
          manualText.innerText = query;
        } else {
          btnManual.classList.add('hidden');
        }
      }
      lucide.createIcons();
    }

    function selectProduct(nama, harga) {
      const input = document.getElementById(currentTargetInputId);
      const parent = input.closest('[id^="item-"]');
      const priceInput = parent.querySelector('.item-price');
      input.value = nama.toUpperCase();
      if (harga > 0) priceInput.value = harga.toLocaleString('id-ID');
      closeProductModal();
      calcTotal();
      parent.querySelector('.qty-input').focus();
    }

    function selectManual() {
      const query = document.getElementById('modal-search').value.toUpperCase();
      if (query) selectProduct(query, 0);
    }

    function maskNominal(el) {
      let val = el.value.replace(/\D/g, "");
      if (val === "") { el.value = ""; return; }
      el.value = Number(val).toLocaleString('id-ID');
    }

    function unmask(val) {
      if (!val) return 0;
      let clean = val.toString().replace("Rp ", "").replace(/\./g, "");
      return parseFloat(clean) || 0;
    }

    function calcTotal() {
      const items = document.querySelectorAll('[id^="item-"]');
      let subtotal = 0;
      items.forEach(item => {
        const qty = parseFloat(item.querySelector('.qty-input').value) || 0;
        const price = unmask(item.querySelector('.item-price').value);
        subtotal += (qty * price);
      });

      // Penjualan
      const elDisc = document.getElementById('p_disc');
      const elDpPenjualan = document.getElementById('p_dp');
      const elTotalRaw = document.getElementById('p_total_raw');
      const elFinalPenjualan = document.getElementById('p_final');
      if (elFinalPenjualan) {
        const disc = elDisc ? unmask(elDisc.value) : 0;
        const dp = elDpPenjualan ? unmask(elDpPenjualan.value) : 0;
        const final = subtotal - disc;
        const sisa = final - dp;
        if (elTotalRaw) elTotalRaw.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(subtotal);
        elFinalPenjualan.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(final);
        const statusPiutang = document.getElementById('p_status_piutang');
        if (statusPiutang) {
            if (sisa > 0) {
              statusPiutang.innerText = "Sisa Piutang: Rp " + new Intl.NumberFormat('id-ID').format(sisa);
              statusPiutang.className = "text-[10px] mt-1 text-red-500 font-bold italic";
            } else if (sisa < 0) {
              statusPiutang.innerText = "Kembalian: Rp " + new Intl.NumberFormat('id-ID').format(Math.abs(sisa));
              statusPiutang.className = "text-[10px] mt-1 text-blue-600 font-bold italic";
            } else {
              statusPiutang.innerText = "Lunas";
              statusPiutang.className = "text-[10px] mt-1 text-green-600 font-bold italic";
            }
        }
      }

      // Pembelian
      const elFinalPembelian = document.getElementById('b_final');
      if (elFinalPembelian) elFinalPembelian.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(subtotal);
    }

    function collectItems() {
      const itemsData = [];
      document.querySelectorAll('[id^="item-"]').forEach(el => {
        const inputNama = el.querySelector('.item-name');
        if (!inputNama) return;
        const nama = inputNama.value.toUpperCase();
        const harga = unmask(el.querySelector('.item-price').value);
        if (nama && nama !== "PILIH BARANG STOK...") {
          itemsData.push({
            nama: nama,
            qty: parseFloat(el.querySelector('.qty-input').value) || 1,
            harga: harga
          });
        }
      });
      return itemsData;
    }

    async function runScript(actionName, payload, stayInTab) {
      const btn = document.querySelector('button[onclick*="save"]');
      if (btn) btn.disabled = true;
      showLoading(true);

      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          cache: "no-cache",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
adaTransaksiBaru = true;
        setTimeout(() => {
          refreshData(); 
          fetchMasterStock();
         changeTab(stayInTab);
          showLoading(false);
        }, 1200);

      } catch (err) {
        showLoading(false);
        alert("Koneksi bermasalah. Data gagal terkirim!");
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    function savePenjualan() {
      const items = collectItems();
      if(items.length === 0) return alert("Pilih barang terlebih dahulu!");
      const payload = {
        action: 'processTransaction',
        type: 'PENJUALAN',
        pelanggan: (document.getElementById('p_cust').value || 'UMUM').toUpperCase(),
        items: items,
        diskon: unmask(document.getElementById('p_disc').value),
        dp: unmask(document.getElementById('p_dp').value),
        metode: document.getElementById('p_metode').value
      };
      payload.total = items.reduce((a, b) => a + (b.qty * b.harga), 0);
      runScript('processTransaction', payload, 'penjualan');

      
    }

    function savePembelian() {
      const items = collectItems();
      if(items.length === 0) return alert("Daftar belanja kosong!");
      const total = items.reduce((a, b) => a + (b.qty * b.harga), 0);
      const payload = {
        action: 'processTransaction',
        type: 'PEMBELIAN',
        supplier: (document.getElementById('b_supp').value || '-').toUpperCase(),
        items: items,
        total: total,
        dp: unmask(document.getElementById('b_dp').value),
        metode: document.getElementById('b_metode').value
      };
      runScript('processTransaction', payload, 'pembelian');
    }

    async function saveOperasional() {
      const elNom = document.getElementById('op_nom');
      const elKet = document.getElementById('op_ket');
      const nominal = unmask(elNom?.value);
      const keterangan = elKet?.value.trim();
      const isRefund = document.getElementById('is_refund')?.checked;

      if (nominal <= 0 || !keterangan) return alert("Nominal dan keterangan wajib diisi.");
      
      const payload = {
        action: "saveOperasional", 
        type: isRefund ? "PENGEMBALIAN_DANA" : "OPERASIONAL",
        nominal: nominal,
        keterangan: isRefund ? "[REFUND] " + keterangan : keterangan,
        metode: document.getElementById('op_metode').value
      };
      runScript('saveOperasional', payload, 'operasional');
    }

}

async function fetchUtangList() {
  const container = document.getElementById('action-form-container');

    <div class="p-8 text-center">
      <div class="w-8 h-8 border-4 border-red-200 border-t-red-600 rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Sinkronisasi Utang...</p>
    </div>`;

  try {
    // Menambahkan timestamp agar data selalu fresh
    const res = await fetch(`${WEB_APP_URL}?action=getActivePayables&_=${Date.now()}`);
    const rawData = await res.json();
    
    // Filter hanya yang sisa utangnya > 0
    const data = rawData.filter(u => (parseFloat(u.Sisa_Utang) || 0) > 0);
    
    if (data.length === 0) {

  const dariInput = document.getElementById('t_dari');
  const keInput = document.getElementById('t_ke');
  const dariLabel = document.getElementById('label_t_dari');
  const keLabel = document.getElementById('label_t_ke');
  
  const tempVal = dariInput.value;
  dariInput.value = keInput.value;
  keInput.value = tempVal;
  
  dariLabel.innerText = dariInput.value;
  keLabel.innerText = keInput.value;

async function saveTransfer() {
  const rawNom = document.getElementById('t_nom').value;
  const valNom = unmask(rawNom);
  const dari = document.getElementById('t_dari').value;
  const ke = document.getElementById('t_ke').value;

  if (!valNom || valNom <= 0) {
    alert("Masukkan nominal transfer yang valid");
    return;
  }

  const payload = {
    action: 'processTransaction',
    type: 'TRANSFER',
    dari: dari,
    ke: ke,
    nominal: valNom
  };

  showLoading(true);
  try {
    // Catatan: Google Apps Script seringkali membutuhkan mode 'no-cors' atau 
    // penanganan respon yang tepat agar alert tidak muncul sebagai 'Unexpected Token'
    const response = await fetch(WEB_APP_URL, { 
      method: "POST", 
      body: JSON.stringify(payload) 
    });
    adaTransaksiBaru = true;
    // Memberikan jeda agar sinkronisasi di Google Sheet selesai
    setTimeout(() => {
      refreshData();
      showTransferForm(); 
      showLoading(false);
         }, 1500);

  } catch (e) {
    showLoading(false);
    alert("Terjadi kesalahan koneksi.");
  }
}

        <p class="text-sm font-black text-slate-800 mb-1">${ket}</p>
        <div class="flex justify-between items-center mt-2 pt-2 border-t border-rose-200/50">
          <span class="text-[10px] font-mono text-slate-400">${id}</span>
          <span class="text-sm font-black text-rose-600">${formatRupiah(nom)}</span>
        </div>
      </div>

      <div class="p-4 bg-slate-50 rounded-2xl">
        <p class="text-[11px] text-slate-500 leading-relaxed italic">
          "Membatalkan transaksi ini akan menyesuaikan kembali saldo kas dan stok barang (jika terkait penjualan/pembelian)."
        </p>
      </div>

      <div class="flex gap-2 pt-2">
        <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl active:scale-95 transition-transform">Kembali</button>
        <button onclick="executeCancel('${id}')" 
                class="flex-[2] py-4 bg-rose-600 text-white font-bold rounded-2xl shadow-lg shadow-rose-200 active:scale-95 transition-all">
          Ya, Batalkan Pesanan
        </button>
      </div>
    </div>
  `;
  lucide.createIcons();
}

async function executeCancel(id) {
  const payload = {
    action: 'processTransaction',
    type: 'CANCEL_ORDER',
    idTransaksi: id
  };
  
  closeModal();
  showLoading(true);
  
  try {
    await fetch(WEB_APP_URL, { 
      method: "POST", 
      mode: "no-cors", 
      body: JSON.stringify(payload) 
    });
    adaTransaksiBaru = true;
    // Sesuai Ledger Anda: Pesanan dibatalkan ditandai "CANCEL ORDER" agar tidak pengaruhi saldo
    setTimeout(() => {
      refreshData();
      fetchCancelList();
      showLoading(false);
      alert("Transaksi " + id + " berhasil dibatalkan!");
    }, 1500);
    
  } catch (e) {
    showLoading(false);
    alert("Gagal memproses pembatalan.");
  }
}
   
    window.onload = () => {
      refreshData();
      fetchMasterStock();
      changeTab('penjualan');
    };

    setInterval(() => {
  refreshData(); 
}, 120000);
  </script>
</body>
</html>
